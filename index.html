<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tattoo Studio PRO</title>
<style>
body {margin:0;font-family:Arial;background:#0d0d0d;color:#fff;}
.container{padding:15px;}
button,input{width:100%;padding:12px;margin:6px 0;border-radius:10px;border:none;}
button{background:#c62828;color:#fff;}
canvas{width:100%;border:2px solid #333;touch-action:none;}
</style>
</head>
<body>
<div class="container">
<input type="file" id="camera" accept="image/*" capture="environment" style="display:none">
<input type="file" id="gallery" accept="image/*" style="display:none">
<button onclick="camera.click()">📸 Scatta foto</button>
<button onclick="gallery.click()">🖼️ Galleria</button>
<button onclick="resetPunti()">🔄 Reset punti</button>
<canvas id="canvas"></canvas>
<input type="number" id="realSize" placeholder="Misura reale cm">
<button onclick="calcola()">Calcola</button>
<div id="result"></div>
</div>
<script>
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");
let img=new Image();
let scale=1, offsetX=0, offsetY=0;
let dragging=false, lastX, lastY;
let puntiWidth=[], puntiHeight=[];
camera.onchange=e=>loadImg(e);
gallery.onchange=e=>loadImg(e);
function loadImg(e){ img.src=URL.createObjectURL(e.target.files[0]); }
img.onload=()=>{ canvas.width=img.width; canvas.height=img.height; draw(); };
function draw(){
 ctx.setTransform(scale,0,0,scale,offsetX,offsetY);
 ctx.clearRect(-offsetX/scale,-offsetY/scale,canvas.width/scale,canvas.height/scale);
 ctx.drawImage(img,0,0);
 drawPoints();
}
function drawPoints(){
 puntiWidth.forEach(pt=>drawPoint(pt,"red"));
 puntiHeight.forEach(pt=>drawPoint(pt,"blue"));
}
function drawPoint(pt,c){
 ctx.fillStyle=c; ctx.beginPath(); ctx.arc(pt.x,pt.y,5,0,2*Math.PI); ctx.fill();
}
canvas.onmousedown=e=>{ dragging=true; lastX=e.clientX; lastY=e.clientY; };
canvas.onmousemove=e=>{
 if(dragging){ offsetX+=e.clientX-lastX; offsetY+=e.clientY-lastY; lastX=e.clientX; lastY=e.clientY; draw(); }
};
canvas.onmouseup=()=>dragging=false;
canvas.onwheel=e=>{
 e.preventDefault();
 scale+=e.deltaY*-0.001;
 scale=Math.min(Math.max(.5,scale),3);
 draw();
};
canvas.onclick=e=>{
 let rect=canvas.getBoundingClientRect();
 let x=(e.clientX-rect.left-offsetX)/scale;
 let y=(e.clientY-rect.top-offsetY)/scale;
 if(puntiWidth.length<2){ puntiWidth.push({x,y}); }
 else if(puntiHeight.length<2){ puntiHeight.push({x,y}); }
 draw();
};
function dist(a,b){ return Math.hypot(b.x-a.x,b.y-a.y); }
function getPrezzo(a){ if(a<50)return 80; if(a<100)return 150; return 300; }
function calcola(){
 if(puntiWidth.length<2||puntiHeight.length<2)return alert("Seleziona punti");
 let real=parseFloat(realSize.value);
 let scala=real/dist(puntiWidth[0],puntiWidth[1]);
 let w=dist(puntiWidth[0],puntiWidth[1])*scala;
 let h=dist(puntiHeight[0],puntiHeight[1])*scala;
 let area=w*h;
 let prezzo=getPrezzo(area);
 result.innerHTML=`${w.toFixed(1)} x ${h.toFixed(1)} cm<br>€ ${prezzo}`;
}
function resetPunti(){ puntiWidth=[]; puntiHeight=[]; draw(); }
</script>
</body>
</html>
