<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tattoo Pro Brush</title>
<link rel="manifest" href="manifest.json">
<style>
body{margin:0;background:#0d0d0d;color:#fff;font-family:Arial}
.container{padding:10px}
button,input{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none}
canvas{width:100%;border:2px solid #333;touch-action:none}
</style>
</head>
<body>

<div class="container">

<input type="file" id="file" accept="image/*">
<canvas id="canvas"></canvas>

<input type="range" id="brush" min="2" max="50" value="15">
<label>Dimensione pennello</label>

<input type="number" id="realRef" placeholder="Larghezza reale (cm)">

<button onclick="setMode('draw')">✏️ Disegna</button>
<button onclick="setMode('erase')">🧽 Gomma</button>
<button onclick="clearMask()">🔄 Reset</button>
<button onclick="calcola()">💰 Calcola</button>
<button onclick="pdf()">🧾 PDF</button>

<div id="result"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");
let img=new Image();

let mask=new Set();
let drawing=false;
let mode="draw";

let scale=1, offsetX=0, offsetY=0;
let dragging=false,lastX,lastY;

file.onchange=e=>img.src=URL.createObjectURL(e.target.files[0]);

img.onload=()=>{
 canvas.width=img.width;
 canvas.height=img.height;
 draw();
}

function draw(){
 ctx.setTransform(scale,0,0,scale,offsetX,offsetY);
 ctx.clearRect(-offsetX/scale,-offsetY/scale,canvas.width/scale,canvas.height/scale);
 ctx.drawImage(img,0,0);

 ctx.fillStyle="rgba(0,255,0,0.3)";
 mask.forEach(p=>{
  let [x,y]=p.split(",").map(Number);
  ctx.fillRect(x,y,1,1);
 });
}

canvas.onmousedown=e=>{
 drawing=true;
 lastX=e.clientX;
 lastY=e.clientY;
}

canvas.onmouseup=()=>drawing=false;

canvas.onmousemove=e=>{
 if(dragging){
  offsetX+=e.clientX-lastX;
  offsetY+=e.clientY-lastY;
  lastX=e.clientX;lastY=e.clientY;
  draw();
  return;
 }

 if(!drawing)return;

 let rect=canvas.getBoundingClientRect();
 let x=Math.floor((e.clientX-rect.left-offsetX)/scale);
 let y=Math.floor((e.clientY-rect.top-offsetY)/scale);

 let size=parseInt(document.getElementById("brush").value);

 for(let dx=-size;dx<size;dx++){
  for(let dy=-size;dy<size;dy++){
    let key=(x+dx)+","+(y+dy);
    if(mode==="draw") mask.add(key);
    else mask.delete(key);
  }
 }

 draw();
}

canvas.onwheel=e=>{
 e.preventDefault();
 scale+=e.deltaY*-0.001;
 scale=Math.min(Math.max(.5,scale),5);
 draw();
}

canvas.onmousedown=e=>{
 dragging=true;
 lastX=e.clientX;
 lastY=e.clientY;
}
canvas.onmouseup=()=>dragging=false;

function setMode(m){mode=m;}

function clearMask(){mask.clear();draw();}

function getPrezzo(a){
 if(a<=4)return 80;if(a<=6)return 110;if(a<=8)return 125;if(a<=10)return 140;
 if(a<=12)return 160;if(a<=16)return 175;if(a<=20)return 190;if(a<=30)return 205;
 if(a<=40)return 220;if(a<=60)return 235;if(a<=80)return 250;if(a<=100)return 290;
 if(a<=120)return 315;if(a<=150)return 350;return 410;
}

function calcola(){
 if(mask.size==0)return alert("Seleziona area");
 let ref=parseFloat(document.getElementById("realRef").value);
 if(!ref)return alert("Inserisci misura");

 let minX=9999,maxX=0;
 mask.forEach(p=>{
  let [x,y]=p.split(",").map(Number);
  if(x<minX)minX=x;
  if(x>maxX)maxX=x;
 });

 let pixelWidth=maxX-minX;
 let scala=ref/pixelWidth;
 let area=mask.size*(scala*scala);
 let prezzo=getPrezzo(area);

 document.getElementById("result").innerHTML=
 "Area: "+area.toFixed(1)+" cm²<br>€ "+prezzo;
}

function pdf(){
 const {jsPDF}=window.jspdf;
 let doc=new jsPDF();
 doc.text("The Gallery of Tattoo",20,20);
 let imgData=canvas.toDataURL("image/jpeg",1.0);
 doc.addImage(imgData,"JPEG",15,30,180,100);
 doc.text(document.getElementById("result").innerText,20,140);
 doc.save("preventivo.pdf");
}
</script>

</body>
</html>
