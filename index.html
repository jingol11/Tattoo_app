<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Gallery of Tattoo</title>
<link rel="manifest" href="manifest.json">
<style>
body{margin:0;font-family:Arial;background:#0d0d0d;color:#fff}
.container{padding:10px}
button,input{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none}
canvas{width:100%;border:2px solid #333;touch-action:none}
</style>
</head>
<body>
<div class="container">
<input type="file" id="file" accept="image/*">
<canvas id="canvas"></canvas>
<input type="number" id="realRef" placeholder="Misura reale (cm)">
<button onclick="autoDetect()">🤖 AI Auto</button>
<button onclick="clearMask()">🧹 Reset</button>
<button onclick="calcola()">💰 Calcola</button>
<button onclick="pdf()">🧾 PDF</button>
<div id="result"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");
let img=new Image();
let drawing=false;
let mask=new Set();
let bounds=null;

file.onchange=e=>img.src=URL.createObjectURL(e.target.files[0]);

img.onload=()=>{canvas.width=img.width;canvas.height=img.height;ctx.drawImage(img,0,0);}

canvas.onmousedown=()=>drawing=true;
canvas.onmouseup=()=>drawing=false;
canvas.onmousemove=e=>{
 if(!drawing)return;
 let rect=canvas.getBoundingClientRect();
 let x=Math.floor((e.clientX-rect.left)*(canvas.width/rect.width));
 let y=Math.floor((e.clientY-rect.top)*(canvas.height/rect.height));
 mask.add(x+","+y);
 drawMask();
};

function autoDetect(){
 let imgData=ctx.getImageData(0,0,canvas.width,canvas.height);
 let d=imgData.data;
 mask.clear();
 for(let y=0;y<canvas.height;y++){
  for(let x=0;x<canvas.width;x++){
    let i=(y*canvas.width+x)*4;
    let avg=(d[i]+d[i+1]+d[i+2])/3;
    if(avg<110){ mask.add(x+","+y); }
  }
 }
 drawMask();
}

function drawMask(){
 ctx.drawImage(img,0,0);
 ctx.fillStyle="lime";
 let minX=9999,minY=9999,maxX=0,maxY=0;
 mask.forEach(p=>{
  let [x,y]=p.split(",").map(Number);
  ctx.fillRect(x,y,1,1);
  if(x<minX)minX=x;if(y<minY)minY=y;
  if(x>maxX)maxX=x;if(y>maxY)maxY=y;
 });
 bounds={minX,minY,maxX,maxY};
}

function clearMask(){mask.clear();ctx.drawImage(img,0,0);}

function getPrezzo(a){
 if(a<=4)return 80;if(a<=6)return 110;if(a<=8)return 125;if(a<=10)return 140;
 if(a<=12)return 160;if(a<=16)return 175;if(a<=20)return 190;if(a<=30)return 205;
 if(a<=40)return 220;if(a<=60)return 235;if(a<=80)return 250;if(a<=100)return 290;
 if(a<=120)return 315;if(a<=150)return 350;return 410;
}

function calcola(){
 if(mask.size==0)return alert("Seleziona area");
 let ref=parseFloat(document.getElementById("realRef").value);
 if(!ref)return alert("Inserisci misura reale");
 let pixelWidth=bounds.maxX-bounds.minX;
 let scala=ref/pixelWidth;
 let areaReale=mask.size*(scala*scala);
 let prezzo=getPrezzo(areaReale);
 document.getElementById("result").innerHTML=
 "Area: "+areaReale.toFixed(1)+" cm²<br>€ "+prezzo;
}

function pdf(){
 const {jsPDF}=window.jspdf;
 let doc=new jsPDF();
 doc.text("The Gallery of Tattoo",20,20);
 let imgData=canvas.toDataURL("image/jpeg",1.0);
 doc.addImage(imgData,"JPEG",15,30,180,100);
 doc.text(document.getElementById("result").innerText,20,140);
 doc.save("preventivo.pdf");
}
</script>
</body>
</html>
